<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Phil G favicon. IBM-blue rounded square + bold geometric "P"
       inside, white. Path-based (no font dependency) so it renders
       identically on every browser. At 16x16 tab sizes the P stays
       legible because the bowl is wide and the strokes are thick. -->
  <rect width="32" height="32" rx="7" fill="#0f62fe" />
  <path
    d="M 9 6 L 9 26 L 13 26 L 13 19 L 18 19 A 6.5 6.5 0 0 0 18 6 Z M 13 10 L 18 10 A 2.5 2.5 0 0 1 18 15 L 13 15 Z"
    fill="white"
  />
</svg>
